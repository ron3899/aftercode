name: release
# On every version tag: publish the backend container image to GHCR, and build
# prebuilt CLI binaries for macOS / Linux / Windows attached to a GitHub Release.
# Result: users install with no clone and no toolchain on every platform.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  # Build each arch on its OWN native runner (no QEMU emulation — the Rust
  # release compile is too slow/flaky emulated), push by digest, then merge the
  # digests into one multi-arch manifest. Result: `docker run` works natively on
  # both x86_64 servers and Apple Silicon — no --platform flag needed.
  image:
    name: image (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"
        env:
          digest: ${{ steps.build.outputs.digest }}
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ strategy.job-index }}
          path: /tmp/digests/*
          retention-days: 1

  manifest:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Create + push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)
      - name: Inspect
        run: docker buildx imagetools inspect ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}

  binaries:
    name: cli (${{ matrix.target }})
    permissions:
      contents: write # create the Release + upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Native build per runner — git2 (vendored libgit2) and rusqlite (bundled)
      # need a C toolchain, which each OS runner already ships.
      - run: cargo build --release --locked -p aftercode-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dir="target/${{ matrix.target }}/release"
          tar -C "$dir" -czf "aftercode-${{ matrix.target }}.tar.gz" aftercode

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/aftercode.exe" `
            -DestinationPath "aftercode-${{ matrix.target }}.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            aftercode-${{ matrix.target }}.tar.gz
            aftercode-${{ matrix.target }}.zip
          fail_on_unmatched_files: false
